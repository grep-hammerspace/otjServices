services:
  mongo:
    image: mongo:8
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: otjdb
    volumes:
      - mongo_data:/data/db
    networks:
      - otj-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

  mongo-express:
    image: mongo-express:latest
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - otj-net

  app:
    build:
      context: ..
      dockerfile: docker/otjService.Dockerfile
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    ports:
      - "8945:8945"
      - "5005:5005"
    environment:
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/otjdb?authSource=admin
      TAILSCALE_API_KEY: ${TAILSCALE_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      JAVA_DEBUG: ${JAVA_DEBUG:-true}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - otj-net

networks:
  otj-net:
    driver: bridge

volumes:
  mongo_data:
    name: otj_mongo_data
