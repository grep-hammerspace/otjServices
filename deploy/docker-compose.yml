services:
  mongo:
    image: mongo:8
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: otjdb
    volumes:
      - mongo_data:/data/db
    networks:
      - otj-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

  mongo-express:
    image: mongo-express:latest
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - otj-net

  app:
    build:
      context: ..
      dockerfile: docker/otjService.Dockerfile
    restart: unless-stopped
    ports:
      - "8945:8945"
    environment:
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/otjdb
      TAILSCALE_API_KEY: ${TAILSCALE_API_KEY}
      username: ${OA_USERNAME}
      OApassword: ${OA_PASSWORD}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - otj-net

networks:
  otj-net:
    driver: bridge

volumes:
  mongo_data:
    name: otj_mongo_data
